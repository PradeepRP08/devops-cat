apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: job-portal
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: pradeeprp/job-portal-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: frontend-storage
              mountPath: /usr/share/nginx/html/data
      volumes:
        - name: frontend-storage
          persistentVolumeClaim:
            claimName: frontend-pvc
